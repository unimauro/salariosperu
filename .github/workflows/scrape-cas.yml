name: Scrape CAS diario

on:
  schedule:
    - cron: '0 11 * * *'  # 06:00 Lima (UTC-5) = 11:00 UTC, todos los días
  workflow_dispatch:       # permite correr manual desde la UI

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run scraper
        run: python scraper_cas.py

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet cas_vigentes.csv; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push if changed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add cas_vigentes.csv
          ROWS=$(($(wc -l < cas_vigentes.csv) - 1))
          git commit -m "chore: actualizar cas_vigentes.csv ($ROWS convocatorias)"
          git push
