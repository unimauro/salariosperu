<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#0f1419"/>
            <stop offset="100%" stop-color="#1f2c3a"/>
        </linearGradient>
        <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#3498db"/>
            <stop offset="100%" stop-color="#9b59b6"/>
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
            <feOffset dx="0" dy="3"/>
            <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
            <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
        <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="rgba(255,255,255,0.025)" stroke-width="1"/>
        </pattern>
    </defs>

    <rect width="1200" height="630" fill="url(#bg)"/>
    <rect width="1200" height="630" fill="url(#grid)"/>

    <!-- Top bar accent -->
    <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

    <!-- Brand top -->
    <g transform="translate(70, 78)">
        <circle cx="22" cy="22" r="22" fill="url(#accent)" opacity="0.2"/>
        <text x="22" y="30" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="800" fill="#3498db" text-anchor="middle">📊</text>
        <text x="60" y="32" font-family="Inter, system-ui, sans-serif" font-size="26" font-weight="800" fill="#ecf0f1">SalariosPerú</text>
        <text x="60" y="56" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="500" fill="#7f8c8d">Dashboard de sueldos · Perú 2026</text>
    </g>

    <!-- Headline -->
    <g transform="translate(70, 200)">
        <text font-family="Inter, system-ui, sans-serif" font-size="58" font-weight="800" fill="#ecf0f1" letter-spacing="-1">
            <tspan x="0" y="0">¿Cuánto se gana</tspan>
            <tspan x="0" y="72" fill="url(#accent)">realmente en Perú?</tspan>
        </text>
        <text x="0" y="138" font-family="Inter, system-ui, sans-serif" font-size="22" font-weight="500" fill="#b0bec5">
            Sector privado · Público CAS · Calculadora NSE · Mapa regional INEI
        </text>
    </g>

    <!-- KPI cards -->
    <g transform="translate(70, 430)" filter="url(#shadow)">
        <!-- Card 1: Privado -->
        <rect x="0" y="0" width="340" height="115" rx="14" fill="#1a232e" stroke="#3498db" stroke-opacity="0.4" stroke-width="1"/>
        <rect x="0" y="0" width="6" height="115" rx="3" fill="#3498db"/>
        <text x="24" y="32" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#7f8c8d" letter-spacing="0.5">EMPRESAS GRANDES</text>
        <text x="24" y="74" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="800" fill="#ecf0f1">S/ 8,990<tspan font-size="18" fill="#7f8c8d"> /mes</tspan></text>
        <text x="24" y="98" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#95a5a6">Promedio sector privado</text>

        <!-- Card 2: CAS -->
        <rect x="364" y="0" width="340" height="115" rx="14" fill="#1a232e" stroke="#f39c12" stroke-opacity="0.4" stroke-width="1"/>
        <rect x="364" y="0" width="6" height="115" rx="3" fill="#f39c12"/>
        <text x="388" y="32" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#7f8c8d" letter-spacing="0.5">SECTOR PÚBLICO CAS</text>
        <text x="388" y="74" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="800" fill="#ecf0f1">S/ 3,270<tspan font-size="18" fill="#7f8c8d"> /mes</tspan></text>
        <text x="388" y="98" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#95a5a6">Mediana 1,194 vacantes</text>

        <!-- Card 3: Mediana Real (destacada) -->
        <rect x="728" y="0" width="340" height="115" rx="14" fill="#1a232e" stroke="#27ae60" stroke-opacity="0.6" stroke-width="2"/>
        <rect x="728" y="0" width="6" height="115" rx="3" fill="#27ae60"/>
        <text x="752" y="32" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#27ae60" letter-spacing="0.5">🇵🇪 MEDIANA REAL PERÚ</text>
        <text x="752" y="74" font-family="Inter, system-ui, sans-serif" font-size="38" font-weight="800" fill="#ecf0f1">S/ 1,837<tspan font-size="18" fill="#7f8c8d"> /mes</tspan></text>
        <text x="752" y="98" font-family="Inter, system-ui, sans-serif" font-size="14" fill="#27ae60">✓ INEI ENAHO 2023</text>
    </g>

    <!-- URL footer -->
    <text x="1130" y="600" font-family="Inter, system-ui, sans-serif" font-size="16" font-weight="600" fill="#5d6d7e" text-anchor="end">
        unimauro.github.io/salariosperu
    </text>
</svg>
